<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- viewport-fit=cover is critical for safe area insets on iOS -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Bhojana — Mess Manager</title>
  <meta name="description" content="Menu, customers and meal schedule tracking for Bhojana mess service in Palarivattom, Kaloor." />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#152E22" />

  <!-- iOS PWA (Safari does not read manifest for home-screen behaviour) -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Bhojana" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="icons/icon-192.png" />

  <!-- Styles: tokens → base → components → layout → animations -->
  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/layout.css" />
  <link rel="stylesheet" href="styles/animations.css" />
</head>
<body>

  <!-- ══════════════════════════════════════════════════════
       LOADING OVERLAY — shown until DB is ready
  ═══════════════════════════════════════════════════════ -->
  <div id="loading-overlay" role="status" aria-label="Loading Bhojana">
    <div class="loading-logo">
      <div class="loading-logo__leaf" aria-hidden="true">
        <!-- Leaf SVG -->
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10z"/>
          <path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/>
        </svg>
      </div>
      <div class="loading-logo__name">Bhojana</div>
      <div class="loading-rule"></div>
    </div>
    <div class="loading-text">Loading your mess manager…</div>
  </div>

  <!-- ══════════════════════════════════════════════════════
       APP SHELL
  ═══════════════════════════════════════════════════════ -->
  <div id="app-shell">

    <!-- ── Sidebar (desktop ≥ 768px) ─────────────────────── -->
    <nav id="sidebar" aria-label="Main navigation">
      <div class="sidebar__logo">
        <div class="logo-mark">
          <!-- Leaf icon in gold square -->
          <div class="logo-mark__leaf" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10z"/>
              <path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/>
            </svg>
          </div>
          <div class="logo-mark__text">
            <span class="logo-mark__name">Bhojana</span>
            <span class="logo-mark__tagline">Mess Manager</span>
          </div>
        </div>
      </div>
      <div class="kasavu-rule sidebar__rule" aria-hidden="true"></div>

      <div class="sidebar__nav" id="sidebar-nav" role="menubar" aria-label="Page navigation">
        <!-- Populated by app.js -->
      </div>

      <div class="sidebar__bottom">
        <button class="nav-item w-full" id="settings-btn" aria-label="Settings">
          <span class="nav-item__icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
            </svg>
          </span>
          <span class="nav-item__label">Settings</span>
        </button>
        <!-- Android install button (hidden until beforeinstallprompt fires) -->
        <div id="install-btn-container" style="display:none;margin-top:var(--sp-2);">
          <button id="install-btn" class="btn btn--primary w-full" style="font-size:var(--text-xs);gap:6px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v9m0 0l-3-3m3 3l3-3M3 15v4a2 2 0 002 2h14a2 2 0 002-2v-4"/></svg>
            Add to Home Screen
          </button>
        </div>
      </div>
    </nav>

    <!-- ── Mobile Top Bar ─────────────────────────────────── -->
    <header id="topbar" aria-label="App header">
      <div class="topbar__logo">
        <div class="topbar__leaf" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10z"/>
            <path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/>
          </svg>
        </div>
        <span class="topbar__name">Bhojana</span>
      </div>
      <!-- Settings button on mobile topbar -->
      <button class="topbar__settings-btn" id="mobile-settings-btn" aria-label="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
      </button>
      <div class="topbar__rule" aria-hidden="true"></div>
    </header>

    <!-- ── Main Content ───────────────────────────────────── -->
    <main id="main-content" aria-live="polite" aria-label="Page content">
      <!-- Pages rendered here by router -->
    </main>

    <!-- ── Mobile Bottom Nav ──────────────────────────────── -->
    <nav id="bottom-nav" aria-label="Mobile navigation">
      <div class="bottom-nav__items" id="bottom-nav-items" role="tablist">
        <!-- Populated by app.js -->
      </div>
    </nav>
  </div>

  <!-- Toast notifications -->
  <div id="toast-container" role="region" aria-label="Notifications" aria-live="polite"></div>

  <!-- Vendor scripts (non-module, must load before app.js) -->
  <script src="vendor/sql-wasm.js"></script>
  <script src="vendor/html2canvas.min.js"></script>

  <!-- App (ES module) -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
